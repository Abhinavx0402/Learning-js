<!DOCTYPE html>
<html>
<body>

<h1>My Page</h1>
<p class="intro">Intro 1</p>
<p class="intro">Intro 2</p>
<div id="special">Special div</div>
<button id="btn">Button</button>

<script>
  // Try these in console (F12):
  
  // 1. Select h1
  let h1 = document.querySelector("h1");
  console.log(h1);
  
  // 2. Select all p
  let allP = document.querySelectorAll("p");
  console.log(allP.length);  // Should print 2
  
  // 3. Select by class
  let intros = document.querySelectorAll(".intro");
  console.log(intros[0].textContent);  // Should print "Intro 1"
  
  // 4. Select by ID
  let special = document.querySelector("#special");
  console.log(special.textContent);  // Should print "Special div"
  
  // 5. Select button
  let button = document.querySelector("button");
  console.log(button);
</script>

</body>
</html>
