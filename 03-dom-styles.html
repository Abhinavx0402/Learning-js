<!DOCTYPE html>
<html>
<head>
  <style>
    body { font-family: Arial; padding: 20px; }
    
    .box {
      width: 200px;
      height: 100px;
      background: blue;
      color: white;
      padding: 20px;
      margin: 20px 0;
      border: 2px solid black;
      border-radius: 5px;
      font-size: 16px;
      text-align: center;
    }
    
    button { padding: 10px 20px; margin: 5px; cursor: pointer; }
  </style>
</head>
<body>

<h1>Style Changes Demo</h1>

<div id="box" class="box">My Box</div>

<button id="colorBtn">Change Color</button>
<button id="sizeBtn">Make Bigger</button>
<button id="hideBtn">Hide/Show</button>
<button id="resetBtn">Reset</button>

<script>
  let box = document.getElementById("box");
  
  // ===== BUTTON 1: Change Color =====
  document.getElementById("colorBtn").addEventListener("click", function() {
    box.style.background = "red";
    box.style.color = "yellow";
    box.style.borderColor = "green";
  });
  
  // ===== BUTTON 2: Change Size =====
  document.getElementById("sizeBtn").addEventListener("click", function() {
    box.style.width = "400px";
    box.style.height = "200px";
    box.style.fontSize = "24px";
    box.style.padding = "40px";
  });
  
  // ===== BUTTON 3: Hide/Show =====
  document.getElementById("hideBtn").addEventListener("click", function() {
    if (box.style.display === "none") {
      box.style.display = "block";  // Show
    } else {
      box.style.display = "none";   // Hide
    }
  });
  
  // ===== BUTTON 4: Reset =====
  document.getElementById("resetBtn").addEventListener("click", function() {
    box.style.background = "blue";
    box.style.color = "white";
    box.style.width = "200px";
    box.style.height = "100px";
    box.style.fontSize = "16px";
    box.style.padding = "20px";
    box.style.display = "block";
  });
</script>

</body>
</html>
